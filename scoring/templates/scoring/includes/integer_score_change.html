{% if change < 0 %}
  <span class="badge align-text-bottom text-danger">&#9660; {{ change }}</span>
{% elif change > 0 %}
  <span class="badge align-text-bottom text-success">&#9650; {{ change }}</span>
{% elif change == 0 %}
  <span class="badge align-text-bottom text-dark">--</span>
{% else %}
  <span class="badge align-text-bottom text-dark">NA</span>
{% endif %}
